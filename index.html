<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGE Smart Repair</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 60px; }
        .page { display: none; padding: 20px; }
        .active-page { display: block; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #f8f9fa; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #ccc; }
        .nav-item { text-align: center; cursor: pointer; }
        .card { padding: 15px; border: 1px solid #ccc; margin: 5px; border-radius: 8px; cursor: pointer; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .header { text-align: center; padding: 10px; }
    </style>
</head>
<body>

    <div id="home" class="page active-page">
        <div class="header">
            <img src="1000020924.png" alt="BGE Logo" style="width: 150px;">
        </div>
        <h1>BGE Smart Repair</h1>
        <div class="grid">
            <div class="card" onclick="openRepairForm('TV')">📺<br>TV</div>
            <div class="card" onclick="openRepairForm('Fridge')">❄️<br>Fridge</div>
            <div class="card" onclick="openRepairForm('Laundry')">🧺<br>Laundry</div>
            <div class="card" onclick="openRepairForm('Solar')">☀️<br>Solar</div>
            <div class="card" onclick="openRepairForm('Mobile')">📱<br>Mobile</div>
            <div class="card" onclick="openRepairForm('Other')">📦<br>Other</div>
        </div>
        <button onclick="showPage('products'); loadProducts();" style="width: 100%; padding: 15px; margin-top: 20px;">የምርቶች ዝርዝር ይመልከቱ</button>
    </div>

    <div id="products" class="page">
        <h2>የምርቶች ዝርዝር</h2>
        <div id="product-list"></div>
    </div>

    <div id="form-page" class="page">
        <div id="form-content"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="showPage('home')">🏠<br>Home</div>
        <div class="nav-item" onclick="showPage('products'); loadProducts();">📦<br>Products</div>
        <div class="nav-item" onclick="alert('Coming soon')">📅<br>Bookings</div>
        <a href="https://wa.me/251918427112" class="nav-item" style="text-decoration:none; color:inherit;">💬<br>Contact</a>
    </div>

    <script>
        const productsData = [
            { id: 1, name: "Samsung Galaxy S25 Ultra" },
            { id: 2, name: "55 ኢንች TV" },
            { id: 3, name: "65 ኢንች 4K Smart TV" }
        ];

        function loadProducts() {
            const container = document.getElementById('product-list');
            container.innerHTML = productsData.map(p => `
                <div style="border-bottom:1px solid #ccc; padding:10px;">
                    <p>${p.name}</p>
                    <button onclick="openOrderForm('${p.name}')" style="background:blue; color:white; border:none; padding:8px;">ይግዙ</button>
                </div>
            `).join('');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
        }

        function openRepairForm(serviceName) {
            const issues = {
                'TV': ["ድምፅ ኖሮ ምስል የሌለው", "ቀይ መብራት", "ምስል ኖሮ ድምፅ የሌለው", "ሌላ"],
                'Fridge': ["የማይቀዘቅዝ", "ውሃ የሚያፈስ", "ድምፅ የሚያሰማ", "ሌላ"],
                'Laundry': ["የማይሽከረከር", "ውሃ የማይሞላ", "ሌላ"],
                'Solar': ["ባትሪ የማይይዝ", "የማይሞላ", "ሌላ"],
                'Mobile': ["ስክሪን የተሰበረ", "ቻርጅ የማይይዝ", "ሌላ"],
                'Other': ["የቤት እቃዎች", "ሌላ"]
            };
            document.getElementById('form-content').innerHTML = `
                <h2>${serviceName} ጥገና</h2>
                <form action="https://formspree.io/f/xbdbbpkv" method="POST">
                    <select name="Issue" required style="width:100%; padding:10px; margin-bottom:10px;">
                        ${issues[serviceName].map(item => `<option value="${item}">${item}</option>`).join('')}
                    </select>
                    <input type="text" name="Name" placeholder="ሙሉ ስም" required style="width:100%; padding:10px; margin-bottom:10px;">
                    <input type="tel" name="Phone" placeholder="ስልክ ቁጥር" required style="width:100%; padding:10px; margin-bottom:10px;">
                    <input type="text" id="location-input" name="Address" placeholder="አድራሻ/መገኛ ቦታ" required style="width:100%; padding:10px; margin-bottom:10px;">
                    <button type="button" onclick="getLocation()" style="width:100%; padding:10px; margin-bottom:10px; background:#007bff; color:white; border:none;">ራስ-ሰር መገኛዬን ፈልግ</button>
                    <button type="submit" style="width:100%; padding:15px; background:green; color:white; border:none;">ላክ</button>
                </form>
                <button onclick="showPage('home')" style="width:100%; padding:10px; margin-top:10px;">Back</button>
            `;
            showPage('form-page');
        }

        function openOrderForm(productName) {
            document.getElementById('form-content').innerHTML = `
                <h2>${productName} ግዢ</h2>
                <form action="https://formspree.io/f/xbdbbpkv" method="POST">
                    <input type="text" name="Name" placeholder="ሙሉ ስም" required style="width:100%; padding:10px; margin-bottom:10px;">
                    <input type="tel" name="Phone" placeholder="ስልክ ቁጥር" required style="width:100%; padding:10px; margin-bottom:10px;">
                    <input type="text" id="location-input" name="Address" placeholder="አድራሻ/መገኛ ቦታ" required style="width:100%; padding:10px; margin-bottom:10px;">
                    <button type="button" onclick="getLocation()" style="width:100%; padding:10px; margin-bottom:10px; background:#007bff; color:white; border:none;">ራስ-ሰር መገኛዬን ፈልግ</button>
                    <button type="submit" style="width:100%; padding:15px; background:green; color:white; border:none;">ላክ</button>
                </form>
                <button onclick="showPage('products')" style="width:100%; padding:10px; margin-top:10px;">Back</button>
            `;
            showPage('form-page');
        }

        function getLocation() {
            const locInput = document.getElementById("location-input");
            if (navigator.geolocation) {
                locInput.value = "መገኛን በመፈለግ ላይ...";
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        locInput.value = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
                    },
                    (error) => { locInput.value = "መገኛን ማግኘት አልተቻለም"; }
                );
            }
        }
    </script>
    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
    var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
    s1.async=true;
    s1.src='https://embed.tawk.to/62798f1bb0d10b6f3e7160e7/1g2lde1gq';
    s1.charset='UTF-8';
    s1.setAttribute('crossorigin','*');
    s0.parentNode.insertBefore(s1,s0);
    })();
    </script>
</body>
</html>
