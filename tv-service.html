<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የቴሌቪዥን ጥገና አገልግሎት</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; margin: 0; }
        .container { background-color: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #0570FF; font-size: 24px; text-align: center; border-bottom: 2px solid #0570FF; padding-bottom: 10px; }
        .option { font-size: 18px; color: #0570FF; cursor: pointer; margin: 15px 0; font-weight: bold; background: #eef5ff; padding: 12px; border-radius: 8px; }
        .photo-box { display: none; margin: 10px 0; text-align: center; }
        .photo-box img { width: 100%; max-width: 300px; border-radius: 10px; border: 3px solid #0570FF; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #555; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>የቴሌቪዥን ጥገና አገልግሎት</h1>
    <p style="text-align: center;">ችግሩን ይምረጡና ፎቶውን ይመልከቱ:-</p>

    <div class="option" onclick="togglePhoto('photo1')">1. ድምፅ ኑሮ ምስል የሌለው</div>
    <div id="photo1" class="photo-box"><img src="image1.jpg" alt="ምስል የለውም"></div>

    <div class="option" onclick="togglePhoto('photo2')">2. ቀይ መብራት እየበራ የማይሰራ</div>
    <div id="photo2" class="photo-box"><img src="image2.jpg" alt="ቀይ መብራት"></div>

    <div class="option" onclick="togglePhoto('photo3')">3. ምስል ኖሮ ድምፅ የሌለው</div>
    <div id="photo3" class="photo-box"><img src="image3.jpg" alt="ድምፅ የለውም"></div>

    <div class="option" onclick="togglePhoto('photo4')">4. ሶኬት ተሰክቶ ምንም አይነት ላይት የማያሳይ ከሆነ</div>
    <div id="photo4" class="photo-box"><img src="image4.jpg" alt="ምንም ለውጥ የለውም"></div>
    
    <div class="option" onclick="togglePhoto('photo5')">5. ስክሪኑ የተደራረበ መስመር (የስክሪን ብልሽት)</div>
    <div id="photo5" class="photo-box"><img src="image5.jpg" alt="ዲምይት ችግር"></div>

    <a href="index.html" class="back-link">← ወደ ዋናው ገጽ ይመለሱ</a>
</div>

<script>
    function togglePhoto(id) {
        var x = document.getElementById(id);
        var allPhotos = document.getElementsByClassName('photo-box');
        for (var i = 0; i < allPhotos.length; i++) {
            if (allPhotos[i].id !== id) allPhotos[i].style.display = "none";
        }
        x.style.display = (x.style.display === "block") ? "none" : "block";
    }
</script>

</body>
</html>
